llm:
  provider:
    groq:
      enabled: true
      api-key: ${GROQ_API_KEY:${GROQAPIKEY:}}
      model: llama-3.3-70b-versatile
      provider: groq
      base-url: https://api.groq.com/openai/v1
      timeout: 5000

embedding:
  model:
    path: ${EMBEDDING_MODEL_PATH:models/all-MiniLM-L6-v2.onnx}
    name: ${EMBEDDING_MODEL:all-MiniLM-L6-v2}
    dimensions: ${EMBEDDING_DIMENSIONS:384}

cache:
  similarity-threshold: ${SIMILARITY_THRESHOLD:0.5}
  default-ttl-hours: ${CACHE_DEFAULT_TTL_HOURS:24}

spring:
  application:
    name: cacheiq
  config:
    import: optional:file:./secrets.yml
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5436}/${DB_NAME:cacheiq}
    username: ${DB_USER:cacheiq}
    password: ${DB_PASSWORD:cacheiq}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  main:
    banner-mode: off
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

pii:
  sidecar:
    url: ${PRESIDIO_URL:http://localhost:3001}
    timeout: ${PRESIDIO_TIMEOUT:30}
  risk-analyzer:
    personal-indicators: ${PII_INDICATORS:soy,mi nombre,mis datos,cancela,suscripcion,mi cuenta,name,last name,address,phone,account,my name,cancel,subscription,email,mi correo,mi password,mi contraseña,actualizar datos,cambiar clave}

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      enabled: true
  metrics:
    tags:
      application: cacheiq
    export:
      prometheus:
        enabled: true
        step: 1m