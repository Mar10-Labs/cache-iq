name: CI - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      
      - name: Grant execute permission
        run: chmod +x gradlew
      
      - name: Build with Gradle
        run: ./gradlew build -x test --no-daemon
      
      - name: Run tests
        run: ./gradlew test --no-daemon
      
      - name: Generate coverage report
        run: ./gradlew jacocoTestReport --no-daemon
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/jacocoTestReport/html/index.html
      
      - name: Check coverage
        run: |
          COVERAGE=$(./gradlew jacocoTestReport --no-daemon 2>/dev/null | grep -oP 'Total.*?\K\d+%' | tail -1)
          echo "Coverage: $COVERAGE"
          if [ "$COVERAGE" = "0%" ]; then
            echo "Note: Coverage report needs manual verification"
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker compose build --no-cache
      
      - name: Test Docker compose
        run: docker compose up -d && sleep 30 && docker compose ps